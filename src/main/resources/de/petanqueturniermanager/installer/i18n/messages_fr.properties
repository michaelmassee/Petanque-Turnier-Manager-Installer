voraussetzung.java.info.titel=Configurer la version Java dans LibreOffice
voraussetzung.java.info.text=Guide pas \u00e0 pas\u00a0:\n\n1. Ouvrir LibreOffice\n\n2. Dans le menu, cliquer sur \u00ab\u00a0Outils\u00a0\u00bb \u2192 \u00ab\u00a0Options\u2026\u00a0\u00bb\n\n3. Dans le panneau gauche, aller \u00e0 \u00ab\u00a0LibreOffice\u00a0\u00bb \u2192 \u00ab\u00a0Avanc\u00e9\u00a0\u00bb\n\n4. Vous verrez la section \u00ab\u00a0Environnement d'ex\u00e9cution Java\u00a0\u00bb\n\n5. Vous avez deux possibilit\u00e9s\u00a0:\n\n   \u25b6 S\u00e9lectionner une version Java existante\n   \u2192 cochez simplement la version souhait\u00e9e dans la liste\n\n   \u25b6 Ajouter une nouvelle version Java\n   \u2192 cliquer sur \u00ab\u00a0Ajouter\u2026\u00a0\u00bb et s\u00e9lectionner le dossier d'installation\n\n6. Cliquer sur \u00ab\u00a0Appliquer\u00a0\u00bb\n\n7. Red\u00e9marrer LibreOffice pour que le changement prenne effet
