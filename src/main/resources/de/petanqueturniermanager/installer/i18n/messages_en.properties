voraussetzung.java.info.button=Configure LibreOffice Java version\u2026
voraussetzung.java.info.titel=Configure Java Version in LibreOffice
voraussetzung.java.info.text=Step-by-step guide:\n\n1. Open LibreOffice\n\n2. Click "Tools" \u2192 "Options\u2026" in the top menu\n\n3. In the left panel, navigate to "LibreOffice" \u2192 "Advanced"\n\n4. You will see the "Java Runtime Environment" section\n\n5. You have two options:\n\n   \u25b6 Select an existing Java version\n   \u2192 simply check the desired version in the list\n\n   \u25b6 Add a new Java version\n   \u2192 click "Add\u2026" and select the installation folder of your Java version\n\n6. Click "Apply"\n\n7. Restart LibreOffice for the change to take effect
