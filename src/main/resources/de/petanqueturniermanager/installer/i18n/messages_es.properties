voraussetzung.java.info.text=Gu\u00eda paso a paso:\n\n1. Abrir LibreOffice\n\n2. En el men\u00fa, hacer clic en \u201cHerramientas\u201d \u2192 \u201cOpciones\u2026\u201d\n\n3. En el panel izquierdo, ir a \u201cLibreOffice\u201d \u2192 \u201cAvanzado\u201d\n\n4. Ver\u00e1 la secci\u00f3n \u201cEntorno de ejecuci\u00f3n de Java\u201d\n\n5. Tiene dos opciones:\n\n   \u25b6 Seleccionar una versi\u00f3n de Java existente\n   \u2192 simplemente marque la versi\u00f3n deseada en la lista\n\n   \u25b6 A\u00f1adir una nueva versi\u00f3n de Java\n   \u2192 hacer clic en \u201cA\u00f1adir\u2026\u201d y seleccionar la carpeta de instalaci\u00f3n\n\n6. Hacer clic en \u201cAceptar\u201d\n\n7. Reiniciar LibreOffice para que el cambio surta efecto
