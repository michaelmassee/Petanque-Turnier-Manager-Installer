name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      oxt_version:
        description: 'OXT-/Hauptprojekt-Version (z. B. 5.31.0) – nur für Testbuilds ohne Tag. Bei Tag-Builds leer lassen.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: michaelmassee/Petanque-Turnier-Manager
          path: Petanque-Turnier-Manager
          token: ${{ secrets.PTM_MAIN_REPO_TOKEN }}

      - name: Download OXT from main project release
        run: |
          VERSION="${{ github.event.inputs.oxt_version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          TAG="v${VERSION}"
          mkdir -p Petanque-Turnier-Manager/build/distributions
          curl -fL --retry 5 --retry-delay 10 \
            "https://github.com/michaelmassee/Petanque-Turnier-Manager/releases/download/${TAG}/PetanqueTurnierManager-${VERSION}.oxt" \
            -o "Petanque-Turnier-Manager/build/distributions/PetanqueTurnierManager-${VERSION}.oxt"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build app-image
        run: ./gradlew buildInstaller -PinstallerType=app-image -PhauptprojektDir=Petanque-Turnier-Manager

      - name: Create AppDir
        run: |
          APP=build/distributions/PetanqueTurnierManager-Installer
          APPDIR=build/AppDir

          mkdir -p "$APPDIR/usr"
          cp -r "$APP"/. "$APPDIR/usr/"

          # AppRun
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          exec "$APPDIR/usr/bin/PetanqueTurnierManager-Installer" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # Icon
          cp build/generated-resources/de/petanqueturniermanager/installer/images/logo.png \
             "$APPDIR/logo.png"

          # Desktop-Datei
          cat > "$APPDIR/PetanqueTurnierManager-Installer.desktop" <<'EOF'
          [Desktop Entry]
          Name=Pétanque Turnier Manager Installer
          Exec=PetanqueTurnierManager-Installer
          Icon=logo
          Type=Application
          Categories=Utility;
          EOF

      - name: Install FUSE
        run: sudo apt-get install -y libfuse2

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
               -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: |
          VERSION="${{ github.event.inputs.oxt_version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          ARCH=x86_64 appimagetool build/AppDir \
            "build/distributions/PetanqueTurnierManager-Installer-${VERSION}-linux.AppImage"
          chmod +x "build/distributions/PetanqueTurnierManager-Installer-${VERSION}-linux.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: build/distributions/PetanqueTurnierManager-Installer-*-linux.AppImage
          if-no-files-found: error

  # ── Windows ───────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: michaelmassee/Petanque-Turnier-Manager
          path: Petanque-Turnier-Manager
          token: ${{ secrets.PTM_MAIN_REPO_TOKEN }}

      - name: Download OXT from main project release
        run: |
          VERSION="${{ github.event.inputs.oxt_version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          TAG="v${VERSION}"
          mkdir -p Petanque-Turnier-Manager/build/distributions
          curl -fL --retry 5 --retry-delay 10 \
            "https://github.com/michaelmassee/Petanque-Turnier-Manager/releases/download/${TAG}/PetanqueTurnierManager-${VERSION}.oxt" \
            -o "Petanque-Turnier-Manager/build/distributions/PetanqueTurnierManager-${VERSION}.oxt"
        shell: bash

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build app-image
        run: ./gradlew buildInstaller -PinstallerType=app-image -PhauptprojektDir=Petanque-Turnier-Manager
        shell: bash

      - name: Build self-extracting EXE (7-Zip SFX)
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.oxt_version }}"
          if (-not $version) { $version = "${env:GITHUB_REF_NAME}" -replace '^v','' }
          $dist    = (Resolve-Path "build/distributions").Path
          $appDir  = Join-Path $dist "PetanqueTurnierManager-Installer"
          $archive = Join-Path $dist "payload.7z"
          $config  = Join-Path $dist "sfx-config.txt"
          $outExe  = Join-Path $dist "PetanqueTurnierManager-Installer-$version-windows.exe"

          # 7-Zip und das SFX-Modul für Installer auf dem Runner finden
          $sevenZip  = "C:\Program Files\7-Zip\7z.exe"
          $sfxModule = "C:\Program Files\7-Zip\7z.sfx"
          if (-not (Test-Path $sevenZip))  { throw "7z.exe nicht gefunden: $sevenZip" }
          if (-not (Test-Path $sfxModule)) { throw "SFX-Modul nicht gefunden: $sfxModule" }

          # 1) app-image-Inhalt als 7z-Archiv (bin\...exe liegt damit an der Archivwurzel)
          if (Test-Path $archive) { Remove-Item $archive -Force }
          & $sevenZip a -t7z -mx=9 $archive (Join-Path $appDir '*')
          if ($LASTEXITCODE -ne 0) { throw "7z a fehlgeschlagen (ExitCode $LASTEXITCODE)" }

          # 2) SFX-Konfiguration: still nach %TEMP% entpacken, Wizard starten, danach aufräumen
          $cfg = @"
          ;!@Install@!UTF-8!
          Title="Pétanque Turnier Manager Installer $version"
          RunProgram="bin\\PetanqueTurnierManager-Installer.exe"
          GUIMode="2"
          ;!@InstallEnd@!
          "@
          $cfg = ($cfg -split "`r?`n" | ForEach-Object { $_.TrimStart() }) -join "`r`n"
          [System.IO.File]::WriteAllText($config, $cfg, (New-Object System.Text.UTF8Encoding($false)))

          # 3) SFX-EXE = 7z.sfx + Konfiguration + Archiv (binär aneinanderhängen)
          $bytes = [System.IO.File]::ReadAllBytes($sfxModule) +
                   [System.IO.File]::ReadAllBytes($config) +
                   [System.IO.File]::ReadAllBytes($archive)
          [System.IO.File]::WriteAllBytes($outExe, $bytes)

          Write-Host "=== distributions-Inhalt ==="
          Get-ChildItem $dist | Format-Table Name,Length | Out-String | Write-Host
          if (-not (Test-Path $outExe)) { throw "SFX-EXE wurde nicht erzeugt: $outExe" }

          # 4) Zwischendateien entfernen
          Remove-Item $archive,$config -Force

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: build/distributions/PetanqueTurnierManager-Installer-*-windows.exe
          if-no-files-found: error

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: michaelmassee/Petanque-Turnier-Manager
          path: Petanque-Turnier-Manager
          token: ${{ secrets.PTM_MAIN_REPO_TOKEN }}

      - name: Download OXT from main project release
        run: |
          VERSION="${{ github.event.inputs.oxt_version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          TAG="v${VERSION}"
          mkdir -p Petanque-Turnier-Manager/build/distributions
          curl -fL --retry 5 --retry-delay 10 \
            "https://github.com/michaelmassee/Petanque-Turnier-Manager/releases/download/${TAG}/PetanqueTurnierManager-${VERSION}.oxt" \
            -o "Petanque-Turnier-Manager/build/distributions/PetanqueTurnierManager-${VERSION}.oxt"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build dmg
        run: ./gradlew buildInstaller -PinstallerType=dmg -PhauptprojektDir=Petanque-Turnier-Manager

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: build/distributions/*.dmg
          if-no-files-found: error

  # ── Release ───────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

      - name: Upload installers to main project release
        env:
          GH_TOKEN: ${{ secrets.PTM_MAIN_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="michaelmassee/Petanque-Turnier-Manager"
          # Nur hochladen wenn passendes Release im Hauptprojekt existiert
          gh release view "$TAG" --repo "$REPO" 2>/dev/null \
            && gh release upload "$TAG" --repo "$REPO" --clobber artifacts/**/* \
            || echo "Kein Release '$TAG' in $REPO – übersprungen"
