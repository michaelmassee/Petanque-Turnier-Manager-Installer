plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group   = 'de.petanqueturniermanager'
version = ptmVersion

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

javafx {
    version = '25'
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.graphics']
}

application {
    mainModule = 'de.petanqueturniermanager.installer'
    mainClass  = 'de.petanqueturniermanager.installer.InstallerApp'
    applicationDefaultJvmArgs = ['--enable-native-access=javafx.graphics']
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.14.3'
    testImplementation 'org.assertj:assertj-core:3.27.6'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

// JavaFX-JARs explizit auf den Modulpfad setzen (org.openjfx.javafxplugin 0.1.0
// konfiguriert dies nur für JavaExec, nicht für compileJava)
compileJava {
    doFirst {
        options.compilerArgs += [
            '--module-path', classpath.asPath,
        ]
        classpath = files()
    }
}

// Tests im unnamed module – Modulpfad explizit setzen und Modul öffnen
compileTestJava {
    doFirst {
        options.compilerArgs += [
            '--module-path', classpath.asPath,
            '--add-modules', 'ALL-MODULE-PATH',
        ]
        classpath = files()
    }
}

// Test-Ausführung: normaler Classpath-Modus (JUnit-Launcher benötigt Classpath)
test {
    useJUnitPlatform()
}

// OXT + Logo aus dem Hauptprojekt in die Ressourcen kopieren
def hauptprojektDir    = file("../Petanque-Turnier-Manager")
def oxtResDir          = 'src/main/resources/de/petanqueturniermanager/installer/oxt'
def imagesResDir       = 'src/main/resources/de/petanqueturniermanager/installer/images'

tasks.register('copyOxt', Copy) {
    group       = 'build'
    description = 'Kopiert die OXT-Datei aus dem Hauptprojekt'
    from("${hauptprojektDir}/build/distributions") { include '*.oxt' }
    into oxtResDir
    rename { 'extension.oxt' }
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.register('copyLogo', Copy) {
    group       = 'build'
    description = 'Kopiert das Logo aus dem Hauptprojekt'
    from("${hauptprojektDir}/images") { include 'petanqueturniermanager-logo-256px.png' }
    into imagesResDir
    rename { 'logo.png' }
}

processResources.dependsOn copyOxt, copyLogo

// jlink – minimales Runtime-Image
def runtimeImageDir  = layout.buildDirectory.dir('runtime-image')
def distributionsDir = layout.buildDirectory.dir('distributions')

def javaLauncher = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(25)
}

def javaHomePfad = javaLauncher.map { launcher ->
    launcher.executablePath.asFile.parentFile.parentFile.absolutePath
}

tasks.register('jlinkImage') {
    group       = 'distribution'
    description = 'Erstellt minimales JRE-Image via jlink'
    dependsOn assemble

    inputs.files configurations.runtimeClasspath
    outputs.dir runtimeImageDir

    doFirst {
        def outputDir = runtimeImageDir.get().asFile
        if (outputDir.exists()) {
            outputDir.deleteDir()
        }
    }

    doLast {
        def javaHome   = javaHomePfad.get()
        def modulePath = [
            configurations.runtimeClasspath.asPath,
            tasks.jar.archiveFile.get().asFile.absolutePath
        ].join(File.pathSeparator)

        def exitCode = new ProcessBuilder(
                "${javaHome}/bin/jlink",
                '--module-path', modulePath,
                '--add-modules', 'de.petanqueturniermanager.installer',
                '--output', runtimeImageDir.get().asFile.absolutePath,
                '--strip-debug',
                '--compress=2',
                '--no-header-files',
                '--no-man-pages')
            .inheritIO().start().waitFor()
        if (exitCode != 0) throw new GradleException("jlink fehlgeschlagen (Exit-Code $exitCode)")
    }
}

// jpackage – nativen Installer erzeugen
tasks.register('buildInstaller') {
    group       = 'distribution'
    description = 'Erzeugt nativen Installer (deb/rpm/msi/dmg) via jpackage'
    dependsOn jlinkImage

    doFirst {
        def distDir = distributionsDir.get().asFile
        distDir.mkdirs()
        def appImageDir = new File(distDir, 'PetanqueTurnierManager-Installer')
        if (appImageDir.exists()) appImageDir.deleteDir()
    }

    doLast {
        def javaHome      = javaHomePfad.get()
        def installerType = (project.findProperty('installerType') as String) ?: 'app-image'

        def args = [
            "${javaHome}/bin/jpackage",
            '--type', installerType,
            '--name', 'PetanqueTurnierManager-Installer',
            '--app-version', version as String,
            '--runtime-image', runtimeImageDir.get().asFile.absolutePath,
            '--module', 'de.petanqueturniermanager.installer/de.petanqueturniermanager.installer.InstallerApp',
            '--java-options', '--enable-native-access=javafx.graphics',
            '--dest', distributionsDir.get().asFile.absolutePath,
            '--description', 'Pétanque Turnier Manager – LibreOffice Extension Installer',
            '--vendor', 'Michael Massee'
        ]
        // Konsolenfenster auf Windows – nützlich zum Debuggen, vor Release entfernen
        if (System.getProperty("os.name", "").toLowerCase().contains("win")) {
            args += ['--win-console']
        }

def exitCode = new ProcessBuilder(args.collect { it as String }).inheritIO().start().waitFor()
        if (exitCode != 0) throw new GradleException("jpackage fehlgeschlagen (Exit-Code $exitCode)")
    }
}

// GitHub-Actions-Workflow starten, warten und die 3 Installer nach ~/Transfer laden
tasks.register('buildAll') {
    group       = 'distribution'
    description = 'GitHub-Workflow triggern, auf alle 3 Installer warten und nach ~/Transfer laden'

    doLast {
        def transferDir = new File(System.getProperty("user.home"), "Transfer")
        transferDir.mkdirs()

        // Aktuellen Branch ermitteln
        def branchProc = new ProcessBuilder('git', 'rev-parse', '--abbrev-ref', 'HEAD')
            .redirectErrorStream(true).start()
        def branch = branchProc.inputStream.text.trim()
        branchProc.waitFor()
        if (!branch) throw new GradleException("Branch konnte nicht ermittelt werden")
        logger.lifecycle("Branch: $branch")

        // Workflow starten
        logger.lifecycle("Starte GitHub-Actions-Workflow 'build-installers.yml' ...")
        def triggerExit = new ProcessBuilder(
                'gh', 'workflow', 'run', 'build-installers.yml', '--ref', branch)
            .inheritIO().start().waitFor()
        if (triggerExit != 0) throw new GradleException("Workflow-Start fehlgeschlagen")

        // Kurz warten bis GitHub den Run registriert hat
        Thread.sleep(6000)

        // Run-ID des soeben gestarteten Runs ermitteln
        def runIdProc = new ProcessBuilder(
                'gh', 'run', 'list',
                '--workflow', 'build-installers.yml',
                '--branch', branch,
                '--limit', '1',
                '--json', 'databaseId',
                '--jq', '.[0].databaseId')
            .redirectErrorStream(true).start()
        def runId = runIdProc.inputStream.text.trim()
        runIdProc.waitFor()
        if (!runId) throw new GradleException("Run-ID konnte nicht ermittelt werden")
        logger.lifecycle("Run-ID: $runId – warte auf Abschluss (kann mehrere Minuten dauern) ...")

        // Auf erfolgreichen Abschluss aller 3 Jobs warten
        def watchExit = new ProcessBuilder('gh', 'run', 'watch', runId, '--exit-status')
            .inheritIO().start().waitFor()
        if (watchExit != 0) throw new GradleException("Workflow fehlgeschlagen (Run $runId)")

        // Artefakte in temporäres Verzeichnis laden und dann flach nach ~/Transfer kopieren
        def tmpDir = File.createTempDir('ptm-artifacts-', '')
        try {
            def dlExit = new ProcessBuilder(
                    'gh', 'run', 'download', runId, '--dir', tmpDir.absolutePath)
                .inheritIO().start().waitFor()
            if (dlExit != 0) throw new GradleException("Artefakt-Download fehlgeschlagen")

            // Unterverzeichnisse (installer-linux / installer-windows / installer-macos) flach kopieren
            project.copy {
                from project.fileTree(tmpDir) { include '**/*.*' }
                into transferDir
                eachFile { fcd -> fcd.path = fcd.file.name }
                includeEmptyDirs false
            }
        } finally {
            tmpDir.deleteDir()
        }

        logger.lifecycle("Fertig – 3 Installer in ${transferDir.absolutePath}")
    }
}
